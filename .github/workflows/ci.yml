# Lint + test on every push and PR. Runs in under a minute and gates
# the deploy workflow — if this fails, deploy.yml won't even start.
name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: Backend tests + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.4"

      - name: Sync deps
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check src tests

      - name: Pytest
        run: uv run pytest -q

  frontend:
    name: Frontend typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
