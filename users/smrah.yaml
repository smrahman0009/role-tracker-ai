# Each query becomes a separate JSearch call.
queries:
  - what: "data scientist"
    where: "canada"
  - what: "machine learning engineer"
    where: "canada"
  - what: "software developer"
    where: "canada"
  - what: "AI engineer"
    where: "canada"

# Case-insensitive substring match on employer_name.
# A job is dropped if the company name contains ANY of these.
exclude_companies:
  - bank
  - rbc
  - cibc
  - bmo
  - scotiabank
  - desjardins
  - manulife
  - sun life
  - canada life
  - great-west
  - intact
  - industrial alliance
  - insurance
  - insurer
  - wealth management
  - capital markets

# Case-insensitive substring match on job title.
exclude_title_keywords:
  - banking
  - banker
  - insurance
  - actuary
  - actuarial
  - underwriter
  - wealth

# Personal filter list of publisher names the user prefers not to see
# in their job results. JSearch filters these server-side via the
# exclude_job_publishers parameter; we also re-check locally.
# This list reflects nothing more than the user's personal preferences
# and contains no implied judgment about the listed publishers.
exclude_publishers:
  - BeBee
  - Sercanto
  - Jobrapido
  - Neuvoo
  - Talent.com
  - Jobcase
  - Learn4Good
  - Trovit
  - Mitula
  - Jooble
  - Careerjet
  - Whatjobs
  - Kijiji
